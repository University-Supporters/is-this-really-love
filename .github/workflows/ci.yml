name: CI (Continuous Integration)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci-check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        # cache: 'npm' # package-lock.json 파일이 존재할 때 캐싱 활성화
    
    - name: Check package.json existence
      id: check_package
      run: |
        if [ -f "package.json" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Install dependencies
      if: steps.check_package.outputs.exists == 'true'
      run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

    - name: Check Lint (Optional)
      if: steps.check_package.outputs.exists == 'true'
      run: npm run lint || echo "No lint script found"
      
    - name: Run Tests (Optional)
      if: steps.check_package.outputs.exists == 'true'
      run: npm test || echo "No test script found"

    # - name: Run Accessibility Scanner
    #   uses: github/accessibility-scanner@v3.1.0
